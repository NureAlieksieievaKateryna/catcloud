<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CatCloud Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                    135deg,
                    rgba(219, 39, 119, 0.55),
                    rgba(30, 64, 175, 0.55)
            );
            z-index: -1;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 30px;
        }

        .register {
            width: 420px;
            padding: 38px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 70px rgba(0,0,0,0.25);
            text-align: center;
        }

        .cat-icon {
            width: 78px;
            height: 78px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #db2777, #9333ea);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            box-shadow: 0 12px 28px rgba(219,39,119,0.35);
        }

        h1 {
            margin: 0;
            color: #db2777;
            font-size: 34px;
        }

        .subtitle {
            margin: 10px 0 26px;
            color: #64748b;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #db2777;
            box-shadow: 0 0 0 3px rgba(219,39,119,0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #db2777, #9333ea);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .links {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .links a {
            color: #db2777;
            font-weight: bold;
            text-decoration: none;
        }

        .demo {
            margin-top: 16px;
            padding: 12px;
            border-radius: 14px;
            background: #fdf2f8;
            color: #9d174d;
            font-size: 13px;
        }
    </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="./cats.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="page">
    <div class="register">
        <div class="cat-icon">🐱</div>

        <h1>CatCloud</h1>

        <p class="subtitle">
            Register to upload and store your cat photos securely in Azure Blob Storage.
            Search another cats and make your cat the most popular.
        </p>
        <input id="login" type="login" placeholder="Login">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="register()">Register</button>

        <div class="links">
            Have account? <a href="login.html">Login</a>
        </div>

        <div class="demo">
            Demo page for photo upload laboratory work
        </div>
    </div>
</div>

<script>
    async function register() {
        const login = document.getElementById("login").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const response = await fetch("http://localhost:8080/user/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                login: login,
                email: email,
                password: password
            })
        });

        if (response.ok) {
            const data = await response.json();

            localStorage.setItem("userId", data.id);
            localStorage.setItem("userEmail", data.email);
            localStorage.setItem("userLogin", data.login);

            window.location.href = "main.html";
        } else {
            alert("Registration failed");
        }
    }
</script>

</body>
</html>
